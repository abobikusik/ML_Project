<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>История запросов</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Наши CSS стили -->
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">💿 Сервис генерации описания товаров</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" onclick="btnGoToMainPage()">🏠 Главная</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            📦 Категории
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" onclick="btnGoToPhoneFormClick()">📱 Смартфоны</a></li>
                            <li><a class="dropdown-item" onclick="btnGoToLaptopFormClick()">💻 Ноутбуки</a></li>
                            <li><a class="dropdown-item" onclick="btnGoToTvFormClick()">📺 Телевизоры</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" onclick="btnGoToHistoryPage()">📝 История запросов</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="form-card">
                    <h2 class="main-title">📋 История запросов</h2>

                    <!-- Фильтры -->
                    <div class="filter-section">
                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label">Категория</label>
                                <select class="form-select" id="categoryFilter">
                                    <option value="">Все категории</option>
                                    <option value="phone">📱 Смартфоны</option>
                                    <option value="laptop">💻 Ноутбуки</option>
                                    <option value="tv">📺 Телевизоры</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Статус</label>
                                <select class="form-select" id="statusFilter">
                                    <option value="">Все статусы</option>
                                    <option value="completed">✅ Завершено</option>
                                    <option value="pending">⏳ В обработке</option>
                                    <option value="error">❌ Ошибка</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Поиск</label>
                                <input class="form-control" id="searchInput" placeholder="🔍 Поиск по названию товара">
                            </div>
                        </div>
                    </div>

                    <!-- Таблица истории -->
                    <div class="history-table">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Категория</th>
                                    <th>Товар</th>
                                    <th>Дата</th>
                                    <th>Статус</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="5" class="text-center py-5">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Загрузка...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно с деталями запроса -->
    <div class="modal fade" id="requestModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Детали запроса</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Загружается динамически -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Наш JavaScript -->
    <script src="/static/script.js"></script>
    <script src="/static/history.js"></script>
       
</body>

</html>
