<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Сервис генерации описания товаров</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Наши CSS стили -->
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">💿 Сервис генерации описания товаров</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" onclick="btnGoToMainPage()">🏠 Главная</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            📦 Категории
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" onclick="btnGoToPhoneFormClick()">📱 Смартфоны</a></li>
                            <li><a class="dropdown-item" onclick="btnGoToLaptopFormClick()">💻 Ноутбуки</a></li>
                            <li><a class="dropdown-item" onclick="btnGoToTvFormClick()">📺 Телевизоры</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" onclick="btnGoToHistoryPage()">📝 История запросов</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <!-- Карточка с категориями -->
                <div class="category-card">
                    <h2 class="main-title">
                        Выберите категорию
                    </h2>

                    <!-- КОНТЕЙНЕР С ПРОКРУТКОЙ (высота 350px) -->
                    <div class="category-buttons-container">
                        <div class="category-buttons">
                            <!-- Смартфон -->
                            <div id="go_to_phone_form" class="category-btn" onclick="btnGoToPhoneFormClick()">
                                <span class="category-icon">📱</span>
                                Смартфон
                                <span class="for-arrow">→</span>
                            </div>

                            <!-- Ноутбук -->
                            <div id="go_to_laptop_form" class="category-btn" onclick="btnGoToLaptopFormClick()">
                                <span class="category-icon">💻</span>
                                Ноутбук
                                <span class="for-arrow">→</span>
                            </div>

                            <!-- Телевизор -->
                            <div id="go_to_tv_form" class="category-btn" onclick="btnGoToTvFormClick()">
                                <span class="category-icon">📺</span>
                                Телевизор
                                <span class="for-arrow">→</span>
                            </div>


                        </div>
                    </div>

                </div>

                <!-- Подсказка -->
                <div style="text-align: center; color: #666; margin-top: 20px;">
                    <small>ООО "ТМЫВ ДЕНЯК"</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Наш JavaScript -->
    <script src="/static/script.js"></script>
</body>

</html>
