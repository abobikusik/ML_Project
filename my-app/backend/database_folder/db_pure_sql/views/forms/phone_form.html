<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Сервис генерации описания товаров</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Наши CSS стили -->
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>
    <!-- Навигационная панель -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">💿 Сервис генерации описания товаров</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" onclick="btnGoToMainPage()">🏠 Главная</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">
                            📦 Категории
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item active" onclick="btnGoToPhoneFormClick()">📱 Смартфоны</a></li>
                            <li><a class="dropdown-item" onclick="btnGoToLaptopFormClick()">💻 Ноутбуки</a></li>
                            <li><a class="dropdown-item" onclick="btnGoToTvFormClick()">📺 Телевизоры</a></li>
                        </ul>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" onclick="btnGoToHistoryPage()">📝 История запросов</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-14 col-lg-8">
                <!-- Карточка формы -->
                <div class="form-card">
                    <h2 class="main-title">
                        Введите характеристки для генерации описания Телефона
                    </h2>
                    <div class="row">
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">Бренд</label>
                                <input id="phoneBrand" class="form-control" placeholder="Apple, Samsung" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Модель</label>
                                <input id="phoneModel" class="form-control" placeholder="Iphone Air, Pro" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Диагональ (дюймы)</label>
                                <input id="phoneScreen_size" class="form-control" placeholder="6.7" type="number"
                                    step="0.1" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Тип матрицы</label>
                                <input id="phoneDisplay_type" class="form-control" placeholder="AMOLED" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Частота обновления (Гц)</label>
                                <input id="phoneScreen_refresh" class="form-control" placeholder="120" type="number" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Операционная система</label>
                                <input id="phoneOS" class="form-control" placeholder="iOS 26" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Сотовая связь</label>
                                <input id="phoneCellular" class="form-control" placeholder="5G" />
                            </div>
                        </div>
                        <div class="col">
                            <div class="mb-3">
                                <label class="form-label">Процессор</label>
                                <input id="phoneProcessor" class="form-control" placeholder="A17 Bionic" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Встроенная память (Гб)</label>
                                <input id="phoneStorage" class="form-control" placeholder="512" type="number" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Разрешение основной камеры (МП)</label>
                                <input id="phoneCamera" class="form-control" placeholder="48" type="number" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Ёмкость батареи (мАч)</label>
                                <input id="phoneBattery" class="form-control" placeholder="5000" type="number" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Скорость проводной зарядки (Вт)</label>
                                <input id="phoneCharging_speed" class="form-control" placeholder="120" type="number" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Материал корпуса</label>
                                <input id="phoneMaterial" class="form-control" placeholder="Титан" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Вес (Гр)</label>
                                <input id="phoneWeight" class="form-control" placeholder="210" type="number" />
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col"></div>
                        <div class="col">
                            <div id="generatePhoneBtn" class="generate-btn" onclick="btnPhoneGenerateClick()">
                                Сгенерировать
                            </div>
                        </div>
                        <div class="col"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Наш JavaScript -->
    <script src="/static/script.js"></script>
</body>

</html>
